<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroMail Secure Login</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at top right, #3b0712, #080203);
            color: #e2e8f0;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(22, 25, 32, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-panel:hover {
            box-shadow: 0 12px 48px 0 rgba(220, 38, 38, 0.15);
        }
        .glass-input {
            background: rgba(15, 17, 23, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f8fafc;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-input:focus {
            border-color: #dc2626;
            outline: none;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25);
            background: rgba(15, 17, 23, 0.9);
        }
        .glass-input:invalid:not(:placeholder-shown) {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.25);
        }
        [v-cloak] {
            display: none;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md mx-auto" v-cloak>
        <div class="glass-panel rounded-2xl p-8 flex flex-col gap-6">
            <div class="text-center flex flex-col items-center justify-center">
                <h1 class="font-outfit text-4xl font-extrabold tracking-wider leading-none text-white"><span class="text-red-600">{{ branding.serverName || 'AJA RETRO' }}</span></h1>
                <p class="text-gray-400 text-xs font-semibold uppercase tracking-widest mt-2">{{ branding.serverName || 'RetroMail' }} Secure Portal</p>
            </div>
            
            <div v-if="errorMsg" class="bg-red-950/60 border border-red-800 text-red-300 p-3 rounded-lg text-sm text-center flex items-center justify-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> {{ errorMsg }}
            </div>
 
            <form @submit.prevent="handleLogin" class="flex flex-col gap-4">
                <div>
                    <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wider">Username</label>
                    <input type="text" v-model="loginForm.username" required maxlength="16" pattern="^[a-zA-Z0-9_-]{3,16}$" title="Username must be 3-16 characters and contain only alphanumeric, dashes, or underscores" class="w-full glass-input rounded-xl px-4 py-3 text-sm" placeholder="Enter username...">
                </div>
                <div>
                    <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wider">Password</label>
                    <input type="password" v-model="loginForm.password" required maxlength="128" class="w-full glass-input rounded-xl px-4 py-3 text-sm" placeholder="••••••••">
                </div>
                <div>
                    <label class="block text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wider">2FA Token (Optional)</label>
                    <input type="text" v-model="loginForm.totpCode" maxlength="6" pattern="^[0-9]{6}$" title="2FA token must be a 6-digit number" class="w-full glass-input rounded-xl px-4 py-3 text-sm text-center tracking-widest" placeholder="123456">
                </div>
                <button type="submit" :disabled="loading" class="w-full bg-gradient-to-r from-red-600 to-red-800 hover:from-red-700 hover:to-red-900 disabled:opacity-50 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg shadow-red-950/40 text-sm mt-2">
                    <span v-if="loading"><i class="fa-solid fa-circle-notch fa-spin mr-1"></i> Logging in...</span>
                    <span v-else>Login Portal <i class="fa-solid fa-arrow-right ml-1"></i></span>
                </button>
            </form>
            
            <div class="border-t border-white/5 pt-4 mt-2 flex justify-center gap-4 text-xs font-semibold text-gray-500">
                <a v-if="branding.discordLink" :href="branding.discordLink" target="_blank" class="hover:text-slate-300 transition"><i class="fa-brands fa-discord"></i> Discord</a>
                <a v-if="branding.forumLink" :href="branding.forumLink" target="_blank" class="hover:text-slate-300 transition"><i class="fa-solid fa-comments"></i> Forums</a>
                <a v-if="branding.documentationLink" :href="branding.documentationLink" target="_blank" class="hover:text-slate-300 transition"><i class="fa-solid fa-book"></i> Docs</a>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const errorMsg = ref('');
                const loading = ref(false);
                const tokenKey = 'retromail_token';
                const branding = ref({
                    serverName: '',
                    discordLink: '',
                    documentationLink: '',
                    forumLink: ''
                });

                const fetchBrandingInfo = async () => {
                    try {
                        const response = await fetch('/api/info');
                        const data = await response.json();
                        branding.value = data;
                    } catch (e) {
                        console.error('Failed to fetch branding info', e);
                    }
                };

                const loginForm = ref({
                    username: '',
                    password: '',
                    totpCode: ''
                });

                const handleLogin = async () => {
                    errorMsg.value = '';
                    loading.value = true;
                    try {
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                username: loginForm.value.username,
                                password: loginForm.value.password,
                                totp_code: loginForm.value.totpCode
                            })
                        });

                        const data = await response.json();
                        if (data.status === 'success') {
                            localStorage.setItem(tokenKey, data.token);
                            window.location.href = '/inbox.html';
                        } else {
                            errorMsg.value = data.message;
                        }
                    } catch (e) {
                        errorMsg.value = 'Failed to connect to authentication server.';
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(async () => {
                    await fetchBrandingInfo();
                    const token = localStorage.getItem(tokenKey);
                    if (token) {
                        window.location.href = '/inbox.html';
                    }
                });

                return {
                    errorMsg,
                    loading,
                    loginForm,
                    branding,
                    handleLogin
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
