# RetroMail Messages Configuration (Supports color codes using &)

cooldown-message: "&c[RetroMail] Please wait {time} seconds before requesting another email."
enter-email-prompt: "&e[RetroMail] Please type your email address in chat. Type &c'cancel' &eto abort."
enter-code-prompt: "&e[RetroMail] Please type the verification code sent to your email. Type &c'cancel' &eto abort."
cancelled-action: "&c[RetroMail] Cancelled."
invalid-email: "&c[RetroMail] Invalid email format. Please try again by typing &e/email&c."
