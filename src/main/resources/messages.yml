verification-success: "&a&l[RetroMail] Verification successful! You are now subscribed."
incorrect-code: "&c[RetroMail] Incorrect code. Please reopen the menu with &e/email &cto try again."
unsubscribe-success: "&c[RetroMail] You have been unsubscribed from newsletters."
reset-success: "&c[RetroMail] Verification cancelled and reset."

